<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest_gestor.json">
    <meta name="theme-color" content="#E63B2E">
    <link rel="apple-touch-icon" href="icone.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Pedidos - Nossa Carne</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Space+Mono&family=DM+Serif+Display:ital@1&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --cor-primaria: #111111; --cor-acento: #E63B2E; --cor-bg: #F5F3EE; --cor-papel: #E8E4DD; --raio: 2rem; }
        body { font-family: 'Space Grotesk', sans-serif; background-color: var(--cor-bg); color: var(--cor-primaria); margin: 0; }
        
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; pointer-events: none; z-index: 9999; opacity: 0.05; background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); }

        #tela-login { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(rgba(17,17,17,0.8), rgba(17,17,17,0.95)), url('https://static.ifood-static.com.br/image/upload//capa/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202101170317_NBHB_@2x.jpeg') center/cover no-repeat; padding: 20px; }
        .login-card { background: var(--cor-papel); padding: 40px; border-radius: var(--raio); width: 100%; max-width: 400px; border: 2px solid var(--cor-primaria); box-shadow: 10px 10px 0px var(--cor-primaria); position: relative; z-index: 10; }
        
        .header-gestor { background: var(--cor-primaria); color: var(--cor-papel); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--cor-acento); }
        .btn-acento { background: var(--cor-acento); color: white; border: none; border-radius: 1rem; font-weight: 700; transition: transform 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        .btn-acento:hover { transform: scale(1.03); background: #c52b1f; }

        .pedido-card-admin { background: white; border: 2px solid var(--cor-primaria); border-radius: 1.5rem; padding: 20px; margin-bottom: 15px; box-shadow: 6px 6px 0px var(--cor-papel); transition: 0.3s; }
        .pedido-card-admin.pendente { border-color: var(--cor-acento); background: #fffdfd; animation: alarme 2s infinite; }
        
        .status-tag { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; font-weight: 700; border: 1px solid currentColor; }
        .aba-btn { font-weight: 700; border: none; background: none; color: var(--cor-papel); opacity: 0.5; padding-bottom: 5px; border-bottom: 3px solid transparent; transition: 0.3s; }
        .aba-btn.ativo { opacity: 1; border-bottom-color: var(--cor-acento); }

        @keyframes alarme { 0% { box-shadow: 0 0 0px rgba(230,59,46,0); } 50% { box-shadow: 0 0 20px rgba(230,59,46,0.3); } 100% { box-shadow: 0 0 0px rgba(230,59,46,0); } }
        .font-mono { font-family: 'Space Mono', monospace; }
        .drama-text { font-family: 'DM Serif Display', serif; font-style: italic; }
        
        @media (max-width: 991px) { .header-gestor { flex-direction: column; gap: 15px; padding: 15px; } .header-gestor nav { width: 100%; display: flex; justify-content: space-around; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <audio id="som-campainha" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="tela-login">
        <div class="login-card text-center">
            <img src="https://static.ifood-static.com.br/image/upload/t_thumbnail/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png" width="80" class="mb-3 rounded">
            <h2 class="drama-text mb-4">Acesso ao Balcão</h2>
            <input type="email" id="email-admin" class="form-control mb-3 p-3 rounded-4 border-dark border-2" placeholder="E-mail Operacional">
            <input type="password" id="senha-admin" class="form-control mb-4 p-3 rounded-4 border-dark border-2" placeholder="Senha">
            <button class="btn btn-dark w-100 fw-bold py-3 rounded-pill" onclick="fazerLogin()">ENTRAR NO KDS</button>
            <p id="erro-auth" class="text-danger mt-3 small font-mono fw-bold" style="display:none;">CREDENCIAIS INCORRETAS.</p>
        </div>
    </div>

    <div id="conteudo-gestor" style="display:none;">
        <div class="header-gestor">
            <div class="d-flex align-items-center gap-4">
                <div class="d-none d-md-flex align-items-center gap-2">
                    <img src="https://static.ifood-static.com.br/image/upload/t_thumbnail/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png" style="width: 35px; border-radius: 8px;">
                    <h4 class="m-0 drama-text">Gestor de Pedidos</h4>
                </div>
                <nav class="d-flex gap-4">
                    <button class="aba-btn ativo font-mono" id="tab-pedidos" onclick="alternarAba('pedidos')">PEDIDOS</button>
                    <button class="aba-btn font-mono" id="tab-cardapio" onclick="alternarAba('cardapio')">CONTROLE ESTOQUE</button>
                </nav>
            </div>
            <div class="d-flex gap-3 mt-3 mt-md-0 w-100 w-md-auto justify-content-between">
                <button class="btn btn-acento btn-sm px-4 rounded-pill font-mono" onclick="pedirPermissaoAudio()"><i class="fa-solid fa-volume-high"></i> ATIVAR SOM</button>
                <button class="btn btn-outline-light btn-sm rounded-circle" onclick="fazerLogout()"><i class="fa-solid fa-power-off"></i></button>
            </div>
        </div>

        <div class="container-fluid p-4">
            <section id="secao-pedidos">
                <div class="row g-4" id="lista-gestor-pedidos">
                    <div class="text-center text-muted fw-bold mt-5 font-mono">
                        <div class="spinner-border text-danger mb-3"></div><br>AGUARDANDO CONEXÃO...
                    </div>
                </div>
            </section>

            <section id="secao-cardapio" style="display:none;">
                <div class="card p-4 border-2 shadow-sm mx-auto" style="border-radius: 2rem; max-width: 1000px; border-color: var(--cor-primaria); box-shadow: 8px 8px 0px var(--cor-papel);">
                    <h2 class="drama-text mb-1">Disponibilidade de Itens</h2>
                    <p class="text-muted fw-bold small mb-4 font-mono">PAUSE ITENS QUE ESGOTARAM PARA RETIRÁ-LOS IMEDIATAMENTE DO APP DO CLIENTE.</p>
                    <div class="table-responsive">
                        <table class="table align-middle border-dark">
                            <thead class="font-mono opacity-50">
                                <tr><th>PRODUTO</th><th>CATEGORIA</th><th>DISPONIBILIDADE</th><th>AÇÃO RÁPIDA</th></tr>
                            </thead>
                            <tbody id="tabela-pausa-itens"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app-check.js"></script>

    <script>
        const firebaseConfig = { 
            apiKey: "AIzaSyA-UN0RBgrqJIXLZ9LcZrjn7fQKs8qkPb8", 
            authDomain: "nossa-carne-fidelidade.firebaseapp.com", 
            projectId: "nossa-carne-fidelidade" 
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
            
            try {
                const appCheck = firebase.appCheck();
                appCheck.activate(
                  '6LeWj7ssAAAAAP5MOlIW13JbXc7gwtYKPraguQuc',
                  true
                );
            } catch(e) {
                console.log("Erro no App Check", e);
            }
        }
        
        const db = firebase.firestore(); 
        const auth = firebase.auth();
        let qtdPedidosPendentes = 0; 
        let listaTodosPedidos = [];

        auth.onAuthStateChanged(async u => { 
            if (u) { 
                try {
                    const docAdmin = await db.collection('admins').doc(u.uid).get();
                    if (docAdmin.exists) {
                        document.getElementById('tela-login').style.display = 'none'; 
                        document.getElementById('conteudo-gestor').style.display = 'block'; 
                        carregarGestorPedidos(); 
                    } else {
                        auth.signOut();
                        alert("🔒 ALERTA DE SEGURANÇA: Acesso Restrito à Operação.");
                        document.getElementById('tela-login').style.display = 'flex'; 
                        document.getElementById('conteudo-gestor').style.display = 'none'; 
                    }
                } catch(e) {
                    auth.signOut();
                    alert("🔒 Erro de Permissão no Banco de Dados.");
                }
            } else { 
                document.getElementById('tela-login').style.display = 'flex'; 
                document.getElementById('conteudo-gestor').style.display = 'none'; 
            } 
        });

        async function fazerLogin() { 
            try { 
                await auth.signInWithEmailAndPassword(
                    document.getElementById('email-admin').value, 
                    document.getElementById('senha-admin').value
                ); 
            } catch(e) { 
                document.getElementById('erro-auth').style.display = 'block'; 
            } 
        }

        function fazerLogout() { 
            auth.signOut(); 
        }

        function pedirPermissaoAudio() { 
            document.getElementById('som-campainha').play().then(() => { 
                document.getElementById('som-campainha').pause(); 
                alert("SISTEMA DE ÁUDIO OPERACIONAL."); 
            }).catch(e => alert("ERRO AO ATIVAR SOM. Verifique as permissões do navegador.")); 
        }

        function alternarAba(aba) {
            document.getElementById('secao-pedidos').style.display = aba === 'pedidos' ? 'block' : 'none';
            document.getElementById('secao-cardapio').style.display = aba === 'cardapio' ? 'block' : 'none';
            document.getElementById('tab-pedidos').classList.toggle('ativo', aba === 'pedidos');
            document.getElementById('tab-cardapio').classList.toggle('ativo', aba === 'cardapio');
            if(aba === 'cardapio') {
                carregarCardapioRapido();
            }
        }

        async function carregarCardapioRapido() {
            document.getElementById('tabela-pausa-itens').innerHTML = '<tr><td colspan="4" class="text-center py-4"><div class="spinner-border text-danger"></div></td></tr>';
            
            try {
                const snapshot = await db.collection('cardapio').get(); 
                let html = '';
                let itens = []; 
                
                snapshot.forEach(doc => {
                    itens.push({ id: doc.id, ...doc.data() });
                });
                
                itens.sort((a, b) => a.nome.localeCompare(b.nome));

                itens.forEach(p => {
                    const isAtivo = p.ativo !== false;
                    const badge = isAtivo 
                        ? '<span class="status-tag bg-success text-white border-0">DISPONÍVEL</span>' 
                        : '<span class="status-tag bg-danger text-white border-0">ESGOTADO</span>';
                    const btn = isAtivo 
                        ? `<button class="btn btn-sm btn-outline-danger fw-bold font-mono w-100 rounded-pill" onclick="pausarItemRapido('${p.id}', false)">PAUSAR HOJE</button>` 
                        : `<button class="btn btn-sm btn-success fw-bold font-mono w-100 rounded-pill" onclick="pausarItemRapido('${p.id}', true)">REATIVAR</button>`;
                    
                    html += `
                        <tr>
                            <td>
                                <div class="d-flex align-items-center gap-3">
                                    <img src="${p.imagem_url || 'https://via.placeholder.com/150'}" style="width:40px; height:40px; object-fit:cover; border-radius:8px; border: 1px solid #111;"> 
                                    <span class="fw-bold">${p.nome}</span>
                                </div>
                            </td>
                            <td><span class="font-mono small opacity-75">${p.categoria}</span></td>
                            <td>${badge}</td>
                            <td style="width: 160px;">${btn}</td>
                        </tr>
                    `;
                });
                document.getElementById('tabela-pausa-itens').innerHTML = html;
            } catch(e) {
                document.getElementById('tabela-pausa-itens').innerHTML = '<tr><td colspan="4" class="text-danger text-center">Erro ao carregar cardápio.</td></tr>';
            }
        }

        async function pausarItemRapido(id, status) { 
            try { 
                await db.collection('cardapio').doc(id).update({ ativo: status }); 
                carregarCardapioRapido(); 
            } catch(e) { 
                alert("ERRO NO SISTEMA AO ATUALIZAR STATUS."); 
            } 
        }

        function carregarGestorPedidos() {
            db.collection('vendas_concluidas').orderBy('data_pedido','desc').limit(40).onSnapshot(snapshot => {
                let html = ''; 
                let novosPendentes = 0; 
                listaTodosPedidos = [];
                
                snapshot.forEach(doc => {
                    const p = doc.data(); 
                    p.id = doc.id; 
                    listaTodosPedidos.push(p);
                    
                    const status = p.status || 'pendente';
                    if (status === 'pendente') novosPendentes++;

                    let statusTxt = ''; 
                    let btnAcao = '';
                    
                    if(status === 'pendente') { 
                        statusTxt = 'AGUARDANDO'; 
                        btnAcao = `<button class="btn text-white fw-bold font-mono w-100 rounded-pill py-2 mb-2" style="background-color: var(--cor-acento);" onclick="mudarStatusPedido('${p.id}', 'confirmado')">ACEITAR PEDIDO</button>`; 
                    }
                    else if(status === 'confirmado') { 
                        statusTxt = 'CONFIRMADO'; 
                        btnAcao = `<button class="btn btn-dark fw-bold font-mono w-100 rounded-pill py-2 mb-2" onclick="mudarStatusPedido('${p.id}', 'preparo')">INICIAR PREPARO</button>`; 
                    }
                    else if(status === 'preparo') { 
                        statusTxt = 'EM PREPARO'; 
                        const txtBotao = p.logistica?.modo_entrega === 'retirada' ? 'PRONTO P/ RETIRADA' : 'SAIU PARA ENTREGA';
                        btnAcao = `<button class="btn btn-warning fw-bold font-mono text-dark w-100 rounded-pill py-2 mb-2" onclick="mudarStatusPedido('${p.id}', 'rota')">${txtBotao}</button>`; 
                    }
                    else if(status === 'rota') { 
                        statusTxt = p.logistica?.modo_entrega === 'retirada' ? 'DISP. RETIRADA' : 'EM ROTA'; 
                        btnAcao = `<button class="btn btn-success fw-bold font-mono w-100 rounded-pill py-2 mb-2" onclick="mudarStatusPedido('${p.id}', 'concluido')">CONCLUIR PEDIDO</button>`; 
                    }
                    else if(status === 'concluido') {
                        statusTxt = 'ENTREGUE';
                    }

                    let itensHtml = '';
                    p.itens.forEach(item => { 
                        itensHtml += `
                            <div class="mb-2 border-bottom border-dark pb-1 font-mono small fw-bold">
                                1x ${item.nome}<br>
                                <span class="opacity-50" style="font-size:10px;">${item.obsDetalhes || ''}</span>
                            </div>
                        `; 
                    });
                    
                    const dataStr = p.data_pedido ? p.data_pedido.toDate().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}) : '';
                    const tipoEntrega = p.logistica?.modo_entrega === 'retirada' ? 'RETIRADA' : 'DELIVERY';

                    html += `
                    <div class="col-md-4 col-lg-3">
                        <div class="pedido-card-admin ${status}">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <h3 class="font-mono m-0 fw-bold" style="color: var(--cor-acento);">${p.numero_pedido || p.id.substring(0,4)}</h3>
                                <span class="status-tag bg-dark text-white">${tipoEntrega}</span>
                            </div>
                            <div class="fw-bold mb-1">${p.cliente.nome} <span class="font-mono opacity-50 float-end">${dataStr}</span></div>
                            <div class="small opacity-75 mb-3 font-mono" style="font-size:11px;">
                                <i class="fa-solid fa-location-dot"></i> ${p.logistica?.endereco}
                            </div>
                            <div class="p-3 rounded-4 mb-3 border border-dark" style="background: var(--cor-bg); min-height: 100px; max-height: 180px; overflow-y:auto;">
                                ${itensHtml}
                            </div>
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="fw-bold text-success font-mono">R$ ${p.financeiro.total_pago_reais.toFixed(2)}</span>
                                <span class="status-tag">${statusTxt}</span>
                            </div>
                            ${btnAcao}
                            <button class="btn btn-outline-dark btn-sm font-mono w-100 rounded-pill" onclick="imprimirComanda('${p.id}')">
                                <i class="fa-solid fa-print"></i> IMPRIMIR
                            </button>
                        </div>
                    </div>`;
                });
                
                document.getElementById('lista-gestor-pedidos').innerHTML = html;
                
                // Toca o som apenas se o número de pedidos pendentes aumentou
                if (novosPendentes > qtdPedidosPendentes) { 
                    document.getElementById('som-campainha').play().catch(e => console.log("Áudio bloqueado pelo navegador.")); 
                }
                qtdPedidosPendentes = novosPendentes;
            });
        }

        async function mudarStatusPedido(id, status) { 
            await db.collection('vendas_concluidas').doc(id).update({ status: status }); 
        }

        function imprimirComanda(idPedido) {
            const p = listaTodosPedidos.find(x => x.id === idPedido); 
            if(!p) return;
            
            let itensPrint = ''; 
            p.itens.forEach(i => { 
                itensPrint += `
                    <div style="font-weight: bold; margin-top: 5px;">1x ${i.nome} - R$ ${i.preco.toFixed(2)}</div>
                    <div style="font-size: 12px; margin-left: 10px;">${i.obsDetalhes || ''}</div>
                    <div style="border-bottom: 1px dashed #000; margin: 5px 0;"></div>
                `; 
            });
            
            const dataStr = p.data_pedido ? p.data_pedido.toDate().toLocaleString('pt-BR') : new Date().toLocaleString('pt-BR');
            const janela = window.open('', '', 'width=400,height=600');
            
            janela.document.write(`
                <html>
                <head>
                    <title>Comanda</title>
                    <style>
                        body { font-family: monospace; width: 300px; margin: 0; padding: 10px; color: #000; } 
                        .center { text-align: center; } 
                        .bold { font-weight: bold; } 
                        .line { border-bottom: 1px dashed #000; margin: 10px 0; }
                    </style>
                </head>
                <body>
                    <h2 class="center m-0">NOSSA CARNE</h2>
                    <div class="center">Pedido ${p.numero_pedido || p.id.substring(0,4)}</div>
                    <div class="center" style="font-size:12px;">${dataStr}</div>
                    <div class="line"></div>
                    <div><span class="bold">Cliente:</span> ${p.cliente.nome}</div>
                    <div><span class="bold">Endereço:</span> ${p.logistica?.endereco}</div>
                    <div class="line"></div>
                    <h3 class="center m-0">ITENS</h3>
                    <div class="line"></div>
                    ${itensPrint}
                    <div style="font-size: 18px; font-weight: bold; text-align: right; margin-top: 10px;">
                        TOTAL: R$ ${p.financeiro.total_pago_reais.toFixed(2)}
                    </div>
                    <script>
                        setTimeout(() => { window.print(); window.close(); }, 500);
                    <\/script>
                </body>
                </html>
            `);
        }
    </script>
</body>
</html>
