<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Área Restrita - Nossa Carne</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f4f7f6; }
        #tela-login { height: 100vh; display: flex; align-items: center; justify-content: center; background: #2c3e50; }
        .login-card { background: white; padding: 40px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        #conteudo-admin { display: none; } /* Escondido até o login */
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 250px; }
        .main-content { margin-left: 250px; padding: 30px; }
        .nav-link { color: #ecf0f1; margin-bottom: 10px; cursor: pointer; }
        .nav-link.active { background: #34495e; border-radius: 5px; }
        .img-preview { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="tela-login">
        <div class="login-card text-center">
            <img src="https://static.ifood-static.com.br/image/upload/t_thumbnail/logosgde/ef733dfb-3edf-42ef-9aea-9a87b00dcbdc/202510141310_BXc1_i.png" width="80" class="mb-3">
            <h4 class="fw-bold mb-4">Acesso Administrativo</h4>
            <input type="email" id="email-admin" class="form-control mb-3" placeholder="E-mail">
            <input type="password" id="senha-admin" class="form-control mb-4" placeholder="Senha">
            <button class="btn btn-danger w-100 fw-bold" onclick="fazerLoginAdmin()">Entrar no Sistema</button>
            <p id="erro-auth" class="text-danger mt-3 small" style="display:none;">Acesso negado!</p>
        </div>
    </div>

    <div id="conteudo-admin">
        <div class="sidebar d-flex flex-column p-3">
            <h3 class="text-center mb-4 fw-bold">Nossa Carne <br><small style="font-size: 14px;">Admin</small></h3>
            <hr>
            <nav class="nav flex-column">
                <a class="nav-link active" onclick="mostrarSecao('pedidos')"><i class="fa-solid fa-receipt me-2"></i> Pedidos</a>
                <a class="nav-link" onclick="mostrarSecao('cardapio')"><i class="fa-solid fa-utensils me-2"></i> Cardápio</a>
                <a class="nav-link mt-5 text-danger" onclick="fazerLogout()"><i class="fa-solid fa-right-from-bracket me-2"></i> Sair</a>
            </nav>
        </div>

        <div class="main-content">
            <section id="secao-pedidos">
                <h2 class="fw-bold mb-4">Vendas em Tempo Real</h2>
                <div class="card p-4 border-0 shadow-sm">
                    <table class="table align-middle">
                        <thead>
                            <tr><th>Data</th><th>Cliente</th><th>Total</th><th>Status</th></tr>
                        </thead>
                        <tbody id="tabela-pedidos"></tbody>
                    </table>
                </div>
            </section>

            <section id="secao-cardapio" style="display:none;">
                <div class="d-flex justify-content-between mb-4">
                    <h2 class="fw-bold">Gestão de Produtos</h2>
                    <button class="btn btn-primary" onclick="abrirModalProduto()"><i class="fa-solid fa-plus"></i> Novo</button>
                </div>
                <div class="card p-4 border-0 shadow-sm">
                    <table class="table">
                        <thead><tr><th>Foto</th><th>Nome</th><th>Preço</th><th>Ações</th></tr></thead>
                        <tbody id="tabela-cardapio"></tbody>
                    </table>
                </div>
            </section>
        </div>
    </div>

    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content p-3">
                <input type="hidden" id="item-id">
                <input type="text" id="item-nome" class="form-control mb-2" placeholder="Nome">
                <input type="number" id="item-preco" class="form-control mb-2" placeholder="Preço">
                <input type="text" id="item-pdv" class="form-control mb-2" placeholder="Cód PDV">
                <input type="text" id="item-foto" class="form-control mb-3" placeholder="URL Foto">
                <button class="btn btn-success w-100" onclick="salvarProduto()">Salvar</button>
                <button class="btn btn-link text-danger w-100 mt-2" onclick="excluirProduto()">Excluir Item</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyA-UN0RBgrqJIXLZ9LcZrjn7fQKs8qkPb8",
            authDomain: "nossa-carne-fidelidade.firebaseapp.com",
            projectId: "nossa-carne-fidelidade",
            storageBucket: "nossa-carne-fidelidade.firebasestorage.app",
            messagingSenderId: "837465163879",
            appId: "1:837465163879:web:b3eeeeeca3a9816a5a2cc2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let modalProd;

        // VERIFICA SE ESTÁ LOGADO
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('conteudo-admin').style.display = 'block';
                carregarPedidosAdmin();
                modalProd = new bootstrap.Modal(document.getElementById('modalProduto'));
            } else {
                document.getElementById('tela-login').style.display = 'flex';
                document.getElementById('conteudo-admin').style.display = 'none';
            }
        });

        async function fazerLoginAdmin() {
            const email = document.getElementById('email-admin').value;
            const senha = document.getElementById('senha-admin').value;
            try {
                await auth.signInWithEmailAndPassword(email, senha);
            } catch (error) {
                document.getElementById('erro-auth').style.display = 'block';
            }
        }

        function fazerLogout() { auth.signOut(); }

        function mostrarSecao(secao) {
            document.getElementById('secao-pedidos').style.display = secao === 'pedidos' ? 'block' : 'none';
            document.getElementById('secao-cardapio').style.display = secao === 'cardapio' ? 'block' : 'none';
            if(secao === 'cardapio') carregarCardapioAdmin();
        }

        // LÓGICA DE BLOQUEIO F12 / INSPEÇÃO
        document.onkeydown = function(e) {
            if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && (e.keyCode == 73 || e.keyCode == 74)) || (e.ctrlKey && e.keyCode == 85)) {
                return false;
            }
        };

        // CARREGAR PEDIDOS (REAL-TIME)
        function carregarPedidosAdmin() {
            db.collection('vendas_concluidas').orderBy('data_pedido', 'desc').limit(15)
            .onSnapshot(snap => {
                const tabela = document.getElementById('tabela-pedidos');
                tabela.innerHTML = '';
                snap.forEach(doc => {
                    const p = doc.data();
                    tabela.innerHTML += `<tr>
                        <td>${p.data_pedido?.toDate().toLocaleTimeString() || '--'}</td>
                        <td>${p.cliente.nome}</td>
                        <td>R$ ${p.financeiro.total_pago_reais.toFixed(2)}</td>
                        <td><span class="badge bg-success">Pago</span></td>
                    </tr>`;
                });
            });
        }

        // CRUD CARDÁPIO (SIMPLIFICADO)
        async function carregarCardapioAdmin() {
            const snap = await db.collection('cardapio').get();
            const tab = document.getElementById('tabela-cardapio');
            tab.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                tab.innerHTML += `<tr>
                    <td><img src="${p.imagem_url}" class="img-preview"></td>
                    <td>${p.nome}</td>
                    <td>R$ ${p.preco_atual.toFixed(2)}</td>
                    <td><button class="btn btn-sm btn-primary" onclick="editar('${doc.id}')">Editar</button></td>
                </tr>`;
            });
        }

        function abrirModalProduto() { document.getElementById('item-id').value = ""; modalProd.show(); }
        
        async function editar(id) {
            const doc = await db.collection('cardapio').doc(id).get();
            const p = doc.data();
            document.getElementById('item-id').value = id;
            document.getElementById('item-nome').value = p.nome;
            document.getElementById('item-preco').value = p.preco_atual;
            document.getElementById('item-pdv').value = p.codigo_pdv;
            document.getElementById('item-foto').value = p.imagem_url;
            modalProd.show();
        }

        async function salvarProduto() {
            const id = document.getElementById('item-id').value;
            const dados = {
                nome: document.getElementById('item-nome').value,
                preco_atual: parseFloat(document.getElementById('item-preco').value),
                codigo_pdv: document.getElementById('item-pdv').value,
                imagem_url: document.getElementById('item-foto').value
            };
            id ? await db.collection('cardapio').doc(id).update(dados) : await db.collection('cardapio').add(dados);
            modalProd.hide(); carregarCardapioAdmin();
        }

        async function excluirProduto() {
            const id = document.getElementById('item-id').value;
            if(confirm("Excluir?")) { await db.collection('cardapio').doc(id).delete(); modalProd.hide(); carregarCardapioAdmin(); }
        }
    </script>
</body>
</html>
